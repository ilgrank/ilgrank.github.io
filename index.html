<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PS7 Bot — Mini App</title>

    <!--
        Telegram Mini App SDK — must be loaded from this exact URL.
        Gives access to window.Telegram.WebApp which provides:
          - User info (initDataUnsafe.user)
          - Theme colours (themeParams)
          - sendData(string) — sends data back to the bot
          - MainButton — the prominent button at the bottom
          - close() — closes the Mini App
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Use Telegram's CSS variables for automatic light/dark theme support */
        :root {
            --tg-bg:          var(--tg-theme-bg-color, #ffffff);
            --tg-text:        var(--tg-theme-text-color, #000000);
            --tg-hint:        var(--tg-theme-hint-color, #999999);
            --tg-link:        var(--tg-theme-link-color, #2678b6);
            --tg-button:      var(--tg-theme-button-color, #2678b6);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary:   var(--tg-theme-secondary-bg-color, #f0f0f0);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-bg);
            color: var(--tg-text);
            padding: 16px;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--tg-hint);
            margin-bottom: 20px;
        }

        .card {
            background: var(--tg-secondary);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 14px;
        }

        .card-label {
            font-size: 0.75rem;
            color: var(--tg-hint);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .card-value {
            font-size: 0.95rem;
            word-break: break-all;
        }

        .card-value a {
            color: var(--tg-link);
            text-decoration: none;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--tg-hint);
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1.5px solid var(--tg-hint);
            background: var(--tg-secondary);
            color: var(--tg-text);
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
            appearance: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--tg-button);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .field {
            margin-bottom: 14px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .field { flex: 1; }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: var(--tg-button);
            color: var(--tg-button-text);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            transition: opacity 0.15s;
        }

        .btn:active { opacity: 0.75; }

        .btn-secondary {
            background: var(--tg-secondary);
            color: var(--tg-text);
            border: 1.5px solid var(--tg-hint);
        }

        .status {
            font-size: 0.85rem;
            color: var(--tg-hint);
            text-align: center;
            margin-top: 6px;
            min-height: 1.2em;
        }

        .status.ok  { color: #4caf50; }
        .status.err { color: #f44336; }

        /* Space at the bottom so content isn't hidden behind MainButton */
        .bottom-pad { height: 80px; }
    </style>
</head>
<body>

<h1>🤖 PS7 Bot — Mini App</h1>
<p class="subtitle">A demo Telegram Mini App powered by a pure PowerShell 7 bot.</p>

<!-- User info card, populated by JS -->
<div class="card" id="userCard">
    <div class="card-label">Logged in as</div>
    <div class="card-value" id="userName">Loading...</div>
</div>

<!-- Theme info card -->
<div class="card">
    <div class="card-label">Theme</div>
    <div class="card-value" id="themeInfo">—</div>
</div>

<!-- Form: data to send back to the bot -->
<div class="card">
    <div class="card-label">Send data to the bot</div>

    <div class="field">
        <label for="msgInput">Your message</label>
        <input type="text" id="msgInput" placeholder="Type something..." maxlength="200">
    </div>

    <div class="row">
        <div class="field">
            <label for="colorSelect">Favourite colour</label>
            <select id="colorSelect">
                <option value="red">🔴 Red</option>
                <option value="green">🟢 Green</option>
                <option value="blue">🔵 Blue</option>
                <option value="yellow">🟡 Yellow</option>
                <option value="purple">🟣 Purple</option>
            </select>
        </div>
        <div class="field">
            <label for="ratingSelect">Rating</label>
            <select id="ratingSelect">
                <option value="5">⭐⭐⭐⭐⭐</option>
                <option value="4">⭐⭐⭐⭐</option>
                <option value="3">⭐⭐⭐</option>
                <option value="2">⭐⭐</option>
                <option value="1">⭐</option>
            </select>
        </div>
    </div>

    <div class="field">
        <label for="notesInput">Notes (optional)</label>
        <textarea id="notesInput" placeholder="Any additional notes..."></textarea>
    </div>

    <!-- Send via MainButton (bottom of screen) or this inline button -->
    <button class="btn" onclick="sendData()">📤 Send to Bot</button>
    <button class="btn btn-secondary" onclick="tg.close()">✖ Close</button>

    <div class="status" id="status"></div>
</div>

<div class="bottom-pad"></div>

<script>
    const tg   = window.Telegram.WebApp;
    const user = tg.initDataUnsafe?.user;

    // Tell Telegram this app is ready and expand to full height
    tg.ready();
    tg.expand();

    // -----------------------------------------------------------------------
    //  Populate user card
    // -----------------------------------------------------------------------
    if (user) {
        const name = [user.first_name, user.last_name].filter(Boolean).join(' ');
        const handle = user.username ? ` (@${user.username})` : '';
        document.getElementById('userName').textContent = name + handle;
    } else {
        document.getElementById('userName').textContent = 'Unknown (open via /webapp in the bot)';
    }

    // -----------------------------------------------------------------------
    //  Populate theme card
    // -----------------------------------------------------------------------
    const colorScheme = tg.colorScheme ?? 'unknown';
    document.getElementById('themeInfo').textContent =
        colorScheme.charAt(0).toUpperCase() + colorScheme.slice(1) +
        ' mode — colours provided by Telegram automatically.';

    // -----------------------------------------------------------------------
    //  MainButton — the big button Telegram shows at the bottom of the screen
    // -----------------------------------------------------------------------
    tg.MainButton.setText('📤 Send to Bot');
    tg.MainButton.show();
    tg.MainButton.onClick(sendData);

    // -----------------------------------------------------------------------
    //  sendData — collects form values and sends JSON back to the bot
    //  The bot receives this in msg.web_app_data.data
    // -----------------------------------------------------------------------
    function sendData() {
        const msg    = document.getElementById('msgInput').value.trim();
        const color  = document.getElementById('colorSelect').value;
        const rating = parseInt(document.getElementById('ratingSelect').value);
        const notes  = document.getElementById('notesInput').value.trim();

        if (!msg) {
            setStatus('Please enter a message first.', 'err');
            document.getElementById('msgInput').focus();
            return;
        }

        const payload = {
            message : msg,
            color   : color,
            rating  : rating,
            notes   : notes || null,
            user    : user ? {
                id         : user.id,
                first_name : user.first_name,
                username   : user.username ?? null
            } : null,
            sentAt  : new Date().toISOString()
        };

        setStatus('Sending...', '');
        tg.MainButton.showProgress();

        try {
            // sendData() sends the string to the bot and closes the Mini App.
            // The bot receives it as msg.web_app_data.data
            tg.sendData(JSON.stringify(payload));
        } catch (e) {
            setStatus('Error: ' + e.message, 'err');
            tg.MainButton.hideProgress();
        }
    }

    function setStatus(text, cls) {
        const el = document.getElementById('status');
        el.textContent = text;
        el.className   = 'status ' + (cls ?? '');
    }
</script>
</body>
</html>
